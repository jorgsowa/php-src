name: JIT Hang Bisect
# Manually/PR-triggered bisect for the Symfony Console OutputFormatter
# tracing-JIT hang seen in the nightly COMMUNITY_asan job. Runs on a native
# x86-64 runner (the bug does not reproduce on ARM or under qemu emulation).
on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      good:
        # 8.4.1-dev — earliest commit satisfying the pinned PHPUnit's php >=8.4.1
        # floor (8.4.0 itself is refused). The hang predates 8.4.12, so GOOD must
        # be well below it; in a NON-debug build (use_debug=false) the GH-19303
        # array-unpack assertion compiles out, so this wide range becomes testable.
        description: 'Known-GOOD commit/tag (no hang, PHP >= 8.4.1)'
        default: '1fd82aa13a00d1c6b1876ff59cf7490d9a4fa33d'
      bad:
        description: 'Known-BAD commit/tag (hang)'
        default: '27c10ddce6302912a46d72a4dcd47c89f1209544'
      symfony_commit:
        description: 'Symfony commit to test against (CI nightly pin)'
        default: 'dce1b899ab0c0e4cef9159c083ef535387a8db12'
      test_target:
        # The whole Console component. The hang needs the cumulative JIT trace
        # state from the broad suite; running only OutputFormatterTest does NOT
        # reproduce it (verified). The array-unpack assertion that this drags in
        # is avoided by starting GOOD past its fix (see `good`).
        description: 'phpunit target (path or class) to run as the hang probe'
        default: 'src/Symfony/Component/Console'
      test_timeout:
        description: 'Per-step test timeout in seconds (hang detector)'
        default: '300'
      use_asan:
        # ON: the hang only reproduces under ASAN instrumentation (verified:
        # non-debug+ASAN hangs, pure release does not). ASAN runs in recover/
        # continue mode (see ASAN_OPTIONS + dropped -fno-sanitize-recover) so the
        # GH-19303 array-unpack error is reported but does not abort, letting the
        # run reach the downstream OutputFormatter hang.
        description: 'Build with ASAN+UBSAN (required for the hang)'
        default: 'true'
      use_debug:
        # --enable-debug enables ZEND_ASSERT. The GH-19303 array-unpack assertion
        # (debug-only) aborts pre-8.4.12 commits and masks the hang. Off by default
        # so older commits run past it; the hang (a timeout) is still detected.
        description: 'Build with --enable-debug (enables ZEND_ASSERT)'
        default: 'false'

permissions:
  contents: read

concurrency:
  group: jit-hang-bisect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bisect:
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      GOOD_REF: ${{ inputs.good || '1fd82aa13a00d1c6b1876ff59cf7490d9a4fa33d' }}
      BAD_REF: ${{ inputs.bad || '27c10ddce6302912a46d72a4dcd47c89f1209544' }}
      SYMFONY_REF: ${{ inputs.symfony_commit || 'dce1b899ab0c0e4cef9159c083ef535387a8db12' }}
      TEST_TARGET: ${{ inputs.test_target || 'src/Symfony/Component/Console' }}
      TEST_TIMEOUT: ${{ inputs.test_timeout || '300' }}
      USE_ASAN: ${{ inputs.use_asan || 'true' }}
      USE_DEBUG: ${{ inputs.use_debug || 'false' }}
      # Mirror the COMMUNITY_asan runtime environment
      USE_ZEND_ALLOC: '0'
      USE_TRACKED_ALLOC: '1'
      # Report-and-continue: don't abort on the GH-19303 array-unpack error so
      # the run reaches the downstream OutputFormatter hang.
      ASAN_OPTIONS: 'halt_on_error=0:detect_leaks=0'
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=0'
      SYMFONY_DEPRECATIONS_HELPER: 'max[total]=999'
    steps:
      - name: Resolve workspace paths
        run: echo "SYMFONY_DIR=$RUNNER_TEMP/symfony" >> "$GITHUB_ENV"

      - name: Checkout php-src (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure bisect endpoints & tags are present
        run: |
          git remote add upstream https://github.com/php/php-src.git || true
          git fetch --tags --quiet upstream
          git rev-parse "${GOOD_REF}^{commit}"
          git rev-parse "${BAD_REF}^{commit}"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool bison re2c pkg-config ccache \
            libxml2-dev libsqlite3-dev libonig-dev libssl-dev zlib1g-dev

      # Host PHP only for installing the Symfony/PHPUnit deps. The pinned
      # Symfony and PHPUnit 14 require php >=8.4, which the runner's distro
      # PHP (8.3) does not provide. The bisect itself uses the PHP we build.
      - name: Set up host PHP 8.4 (for composer)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, dom, tokenizer, ctype, simplexml, fileinfo
          tools: composer

      - name: Set up Symfony test bed (pinned commit)
        run: |
          git clone --no-checkout --filter=blob:none https://github.com/symfony/symfony.git "$SYMFONY_DIR"
          git -C "$SYMFONY_DIR" fetch --depth=1 origin "$SYMFONY_REF"
          git -C "$SYMFONY_DIR" checkout "$SYMFONY_REF"
          ( cd "$SYMFONY_DIR" && composer install --no-progress --ignore-platform-reqs && php ./phpunit install )

      - name: Write bisect predicate
        run: |
          cat > "${{ runner.temp }}/bisect_step.sh" <<'STEP'
          #!/usr/bin/env bash
          # Build PHP (ZTS+JIT[+ASAN]) at the current checkout and probe for the hang.
          # exit 0=GOOD (ran, no hang), 1=BAD (hang/timeout), 125=SKIP (untestable:
          # build failure, JIT off, or unrelated abort/crash).
          set -u
          NCPU="$(nproc)"
          WS="$PWD"
          rev="$(git rev-parse --short HEAD)"
          export CC="ccache gcc" CXX="ccache g++"

          make distclean >/dev/null 2>&1
          ./buildconf --force >/tmp/bc.log 2>&1 || { echo "[$rev] buildconf fail -> skip"; exit 125; }

          CONF=( --enable-zts --enable-opcache
                 --enable-mbstring --enable-tokenizer
                 --with-libxml --enable-dom --enable-xml --enable-xmlwriter --enable-xmlreader --enable-simplexml
                 --enable-ctype --enable-filter --enable-fileinfo --enable-phar --enable-posix --enable-pcntl
                 --disable-cgi )
          [ "${USE_DEBUG:-false}" = "true" ] && CONF+=( --enable-debug )
          if [ "${USE_ASAN:-true}" = "true" ]; then
            # No -fno-sanitize-recover: keep errors recoverable so ASAN_OPTIONS
            # halt_on_error=0 can continue past the array-unpack error.
            CONF+=( "CFLAGS=-fsanitize=undefined,address -DZEND_TRACK_ARENA_ALLOC"
                    "LDFLAGS=-fsanitize=undefined,address" )
          fi
          ./configure "${CONF[@]}" >/tmp/conf.log 2>&1 || { echo "[$rev] configure fail -> skip"; tail -5 /tmp/conf.log; exit 125; }
          make -j"$NCPU" >/tmp/make.log 2>&1 || { echo "[$rev] make fail -> skip"; tail -15 /tmp/make.log; exit 125; }

          PHP_BIN="$WS/sapi/cli/php"
          OC="$(find "$WS" -name opcache.so -path '*/modules/*' | head -1)"
          [ -x "$PHP_BIN" ] && [ -n "$OC" ] || { echo "[$rev] no binary -> skip"; exit 125; }
          JIT=( -dzend_extension="$OC" -dopcache.enable_cli=1 -dopcache.jit=tracing -dopcache.jit_buffer_size=1G
                -dopcache.jit_hot_loop=1 -dopcache.jit_hot_func=1 -dopcache.jit_hot_return=1
                -dopcache.jit_hot_side_exit=1 -dmemory_limit=-1 )
          "$PHP_BIN" "${JIT[@]}" -r 'exit((opcache_get_status(false)["jit"]["enabled"]??false)?0:3);' \
            || { echo "[$rev] JIT not enabled -> skip"; exit 125; }

          cd "$SYMFONY_DIR" || { echo "[$rev] no symfony -> skip"; exit 125; }
          echo "[$rev] probe: $TEST_TARGET (timeout ${TEST_TIMEOUT}s)..."
          timeout "${TEST_TIMEOUT}" "$PHP_BIN" "${JIT[@]}" ./phpunit "$TEST_TARGET" \
              --exclude-group tty --exclude-group benchmark --exclude-group intl-data \
              --exclude-group transient --exclude-group skip >/tmp/test.log 2>&1
          rc=$?
          case "$rc" in
            124) echo "[$rev] HANG (timeout) -> BAD"; exit 1 ;;
            0|1|2) echo "[$rev] completed rc=$rc -> GOOD"; exit 0 ;;
            *) echo "[$rev] abnormal rc=$rc (asan abort / crash) -> SKIP"; tail -5 /tmp/test.log; exit 125 ;;
          esac
          STEP
          chmod +x "${{ runner.temp }}/bisect_step.sh"

      # Build+test both ends before bisecting. A bisect is only meaningful if
      # GOOD is actually clean and BAD actually hangs; this fails fast (and
      # warms ccache) instead of burning hours on mislabeled bounds.
      - name: Validate endpoints
        run: |
          set +e
          STEP="${{ runner.temp }}/bisect_step.sh"
          git checkout -q --detach "$BAD_REF"
          echo "::group::Build+probe BAD ($BAD_REF)"; "$STEP"; rc_bad=$?; echo "::endgroup::"
          git checkout -q --detach "$GOOD_REF"
          echo "::group::Build+probe GOOD ($GOOD_REF)"; "$STEP"; rc_good=$?; echo "::endgroup::"
          {
            echo "## Endpoint validation"
            echo "- BAD  \`$BAD_REF\`: predicate rc=$rc_bad (want 1 = hang)"
            echo "- GOOD \`$GOOD_REF\`: predicate rc=$rc_good (want 0 = clean)"
          } >> "$GITHUB_STEP_SUMMARY"
          fail=0
          if [ "$rc_bad" != "1" ]; then
            echo "::error::BAD endpoint did not hang (rc=$rc_bad). The probe target may not trigger the hang in isolation, or BAD is wrong."
            fail=1
          fi
          if [ "$rc_good" != "0" ]; then
            echo "::error::GOOD endpoint is not clean (rc=$rc_good). It may hang (regression predates it) or abort (unrelated bug); pick a different GOOD."
            fail=1
          fi
          exit $fail

      - name: Run git bisect
        run: |
          git bisect reset >/dev/null 2>&1 || true
          git bisect start
          git bisect bad  "$BAD_REF"
          git bisect good "$GOOD_REF"
          set +e
          git bisect run "${{ runner.temp }}/bisect_step.sh" | tee "${{ runner.temp }}/bisect_out.txt"
          set -e

      - name: Report result
        if: always()
        run: |
          {
            echo "## JIT hang bisect result"
            echo '```'
            grep -E "is the first bad commit" "${{ runner.temp }}/bisect_out.txt" 2>/dev/null \
              || echo "(no single first-bad — likely too many skips; see log)"
            echo '```'
            skips=$(grep -c -- "-> SKIP" "${{ runner.temp }}/bisect_out.txt" 2>/dev/null || echo 0)
            echo "Skipped (untestable) probes: $skips"
            echo "### Full bisect log"
            echo '```'
            git bisect log 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          git bisect reset >/dev/null 2>&1 || true
