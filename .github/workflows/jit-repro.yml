name: ASAN Paste-Read Repro
# Reproduce the COMMUNITY_asan "hang": FileInputHelper::readWithPasteDetection
# reads the stream one byte at a time (`$buf .= fread($s,1)`) up to 16MB. Under
# the ASAN build every append pays realloc+quarantine cost, so time blows up
# super-linearly -> reaching 16MB takes ~hours. This probes increasing sizes
# with JIT on AND off to show it's ASAN-bound and JIT-independent.
on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: jit-repro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      USE_ZEND_ALLOC: '0'
      USE_TRACKED_ALLOC: '1'
      ASAN_OPTIONS: 'halt_on_error=0:detect_leaks=0'
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool bison re2c pkg-config ccache \
            libxml2-dev libsqlite3-dev libonig-dev libssl-dev zlib1g-dev

      - name: Build PHP (debug + ZTS + JIT + ASAN, COMMUNITY_asan config)
        run: |
          export CC="ccache gcc" CXX="ccache g++"
          ./buildconf --force
          ./configure --enable-debug --enable-zts --enable-opcache \
            CFLAGS="-fsanitize=undefined,address -DZEND_TRACK_ARENA_ALLOC" \
            LDFLAGS="-fsanitize=undefined,address" \
            --enable-mbstring --enable-tokenizer --disable-cgi >/tmp/conf.log 2>&1 || { tail -20 /tmp/conf.log; exit 1; }
          make -j"$(nproc)" >/tmp/make.log 2>&1 || { tail -30 /tmp/make.log; exit 1; }
          ./sapi/cli/php -v | head -1

      - name: Write reproducer (byte-by-byte read, like readWithPasteDetection)
        run: |
          cat > /tmp/paste.php <<'P'
          <?php
          // Mirrors FileInputHelper::readWithPasteDetection's inner loop.
          $bytes = (int) ($argv[1] ?? 1048576);
          $s = fopen('php://memory', 'r+');
          fwrite($s, str_repeat('A', $bytes));
          rewind($s);
          $buf = ''; $n = 0;
          $t = microtime(true);
          while (!feof($s)) {
              $c = fread($s, 1);
              if ($c === false || $c === '') break;
              $buf .= $c;            // O(n) realloc+quarantine under ASAN
              ++$n;
          }
          fprintf(STDERR, "size=%dKB read=%d time=%.2fs\n", $bytes >> 10, $n, microtime(true) - $t);
          P

      - name: Probe increasing sizes, JIT on vs off (shows ASAN super-linear blowup)
        run: |
          PHP="$PWD/sapi/cli/php"
          OC="$(find "$PWD" -name opcache.so -path '*/modules/*' | head -1)"
          JIT=(-dzend_extension="$OC" -dopcache.enable_cli=1 -dopcache.jit=tracing -dopcache.jit_buffer_size=1G -dopcache.jit_hot_loop=1 -dopcache.jit_hot_func=1 -dmemory_limit=-1)
          NOJIT=(-dzend_extension="$OC" -dopcache.enable_cli=1 -dopcache.jit=disable -dmemory_limit=-1)
          {
            echo "## ASAN byte-by-byte read: time vs size"
            echo '| size | JIT on | JIT off |'
            echo '|------|--------|---------|'
          } >> "$GITHUB_STEP_SUMMARY"
          for kb in 256 512 1024 2048 4096; do
            bytes=$((kb*1024))
            on=$(timeout 200 "$PHP" "${JIT[@]}" /tmp/paste.php "$bytes" 2>&1 | grep -oE 'time=[0-9.]+s' || echo "timeout>200s")
            off=$(timeout 200 "$PHP" "${NOJIT[@]}" /tmp/paste.php "$bytes" 2>&1 | grep -oE 'time=[0-9.]+s' || echo "timeout>200s")
            echo "probe ${kb}KB: JITon=$on JIToff=$off"
            echo "| ${kb}KB | $on | $off |" >> "$GITHUB_STEP_SUMMARY"
          done
          {
            echo ""
            echo "If time ~4x per size-doubling -> O(n^2); extrapolating to 16MB = hours -> the nightly hang."
          } >> "$GITHUB_STEP_SUMMARY"
